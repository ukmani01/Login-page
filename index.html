<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPEN-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>

<body class="bg-black">
    <div class="flex flex-col min-h-screen bg-cover bg-center relative"
        style="background-image: url('ai-bg.png')">

        <div class="absolute inset-0 bg-black/60 backdrop-blur-[2px]"></div>

        <main class="relative flex-grow flex justify-center items-center px-6 py-12">
            
            <article class="relative bg-white/10 backdrop-blur-xl p-8 md:p-10 w-full max-w-md rounded-2xl shadow-2xl border border-white/20">

                <h2 class="mb-8 text-center text-white font-bold text-2xl md:text-3xl tracking-tight">
                    WELCOME BACK!
                </h2>

                <form>
                    <div class="space-y-5">
                        <div class="flex flex-col">
                            <label class="text-white text-sm mb-1.5 ml-1 opacity-90">Name</label>
                            <input
                                type="text"
                                placeholder="Enter your name"
                                class="w-full border bg-white/10 text-white px-4 py-3 rounded-xl border-white/20 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder:text-white/30" />
                        </div>

                        <div class="flex flex-col">
                            <label class="text-white text-sm mb-1.5 ml-1 opacity-90">Password</label>
                            <input
                                type="password"
                                placeholder="••••••••"
                                class="w-full border bg-white/10 text-white px-4 py-3 rounded-xl border-white/20 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder:text-white/30" />
                        </div>
                    </div>

                    <button
                        type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] text-white mt-8 rounded-xl font-semibold py-3.5 shadow-lg shadow-blue-500/30 transition-all">
                        Register
                    </button>
                </form>
            </article>
        </main>

        <footer class="relative w-full text-center bg-black/40 backdrop-blur-md text-white/60 py-6 px-4 text-xs md:text-sm">
            <p>© 2026 Professional Website. All rights reserved</p>
        </footer>
    </div>

    <script ></script>
</body>
</html>
